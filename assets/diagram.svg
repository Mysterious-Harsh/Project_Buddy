<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 16; ry: 16; }
      .title { font: 700 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .text { font: 400 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .muted { font: 400 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .pill { fill: #F3F4F6; stroke: #111827; stroke-width: 1.5; rx: 14; ry: 14; }
      .arrow { stroke: #111827; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
      .bg { fill: #FAFAFA; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="720" class="bg"/>

  <!-- Header -->
  <text x="60" y="70" class="title">Buddy — OS-Level AI Companion (v1 Architecture)</text>
  <text x="60" y="98" class="muted">Local-first • Durable memory • Context-aware • Deterministic maintenance</text>

  <!-- Left: User / OS -->
  <rect x="70" y="160" width="280" height="120" class="box"/>
  <text x="100" y="205" class="title" font-size="18">User</text>
  <text x="100" y="235" class="text">CLI / UI</text>
  <text x="100" y="260" class="muted">Future: Voice + OS hooks</text>

  <rect x="70" y="320" width="280" height="120" class="box"/>
  <text x="100" y="365" class="title" font-size="18">Operating System</text>
  <text x="100" y="395" class="text">Linux • macOS • Windows</text>
  <text x="100" y="420" class="muted">Platform-independent goal</text>

  <!-- Center: Brain -->
  <rect x="420" y="140" width="420" height="520" class="box"/>
  <text x="450" y="185" class="title">Buddy Brain</text>
  <text x="450" y="212" class="muted">Reasoning pipeline + orchestration</text>

  <!-- Brain modules (pills) -->
  <rect x="460" y="250" width="340" height="52" class="pill"/>
  <text x="480" y="283" class="text">Context Resolver</text>
  <text x="650" y="283" class="muted">anchors + coref</text>

  <rect x="460" y="320" width="340" height="52" class="pill"/>
  <text x="480" y="353" class="text">Decision / Respond Engine</text>
  <text x="650" y="353" class="muted">plans + prompt build</text>

  <rect x="460" y="390" width="340" height="52" class="pill"/>
  <text x="480" y="423" class="text">Prompt Builder</text>
  <text x="650" y="423" class="muted">prompts/* registry</text>

  <rect x="460" y="460" width="340" height="52" class="pill"/>
  <text x="480" y="493" class="text">Memory Manager</text>
  <text x="650" y="493" class="muted">store + retrieve + rank</text>

  <rect x="460" y="530" width="340" height="52" class="pill"/>
  <text x="480" y="563" class="text">Maintenance</text>
  <text x="650" y="563" class="muted">promotion + consolidation</text>

  <!-- Right: Storage + Models -->
  <rect x="900" y="160" width="260" height="140" class="box"/>
  <text x="930" y="205" class="title" font-size="18">LLM</text>
  <text x="930" y="235" class="text">Local / self-hosted</text>
  <text x="930" y="260" class="muted">Ollama / other providers</text>

  <rect x="900" y="340" width="260" height="160" class="box"/>
  <text x="930" y="385" class="title" font-size="18">Durable Memory</text>
  <text x="930" y="415" class="text">SQLiteStore</text>
  <text x="930" y="440" class="muted">source of truth</text>
  <text x="930" y="468" class="text">Lifecycle + Flags</text>

  <rect x="900" y="540" width="260" height="120" class="box"/>
  <text x="930" y="585" class="title" font-size="18">Retrieval Index</text>
  <text x="930" y="615" class="text">VectorStore (Qdrant)</text>
  <text x="930" y="640" class="muted">dense + optional hybrid</text>

  <!-- Arrows -->
  <!-- User -> Brain -->
  <path d="M 350 220 C 380 220, 390 220, 420 220" class="arrow"/>
  <!-- OS -> Brain -->
  <path d="M 350 380 C 380 380, 390 380, 420 380" class="arrow dashed"/>

  <!-- Brain -> LLM -->
  <path d="M 840 230 C 865 230, 875 230, 900 230" class="arrow"/>
  <!-- LLM -> Brain -->
  <path d="M 900 260 C 875 260, 865 260, 840 260" class="arrow dashed"/>

  <!-- Brain -> SQLite -->
  <path d="M 840 470 C 865 470, 875 470, 900 470" class="arrow"/>
  <!-- SQLite -> Brain -->
  <path d="M 900 440 C 875 440, 865 440, 840 440" class="arrow dashed"/>

  <!-- Brain -> Qdrant -->
  <path d="M 840 600 C 865 600, 875 600, 900 600" class="arrow"/>
  <!-- Qdrant -> Brain -->
  <path d="M 900 570 C 875 570, 865 570, 840 570" class="arrow dashed"/>

  <!-- Legend -->
  <rect x="70" y="600" width="520" height="80" class="box"/>
  <text x="100" y="635" class="text">Legend</text>
  <path d="M 185 632 L 245 632" class="arrow"/>
  <text x="260" y="638" class="muted">Primary flow</text>

  <path d="M 385 632 L 445 632" class="arrow dashed"/>
  <text x="460" y="638" class="muted">Optional / future / feedback</text>
</svg>