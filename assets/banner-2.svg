  <style>
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes bGrow   { from{width:0} to{width:573px} }
    @keyframes sweep   { 0%{transform:translateY(-3px)} 100%{transform:translateY(303px)} }
    @keyframes glitch  {
      0%,90%,100% { transform:translate(0,0);opacity:1 }
      91%          { transform:translate(-5px,0);opacity:.75 }
      92%          { transform:translate(5px,0); opacity:.75 }
      93%          { transform:translate(-2px,0);opacity:1 }
    }
    .L  { opacity:0; animation:fadeUp .7s ease forwards 0.05s }
    .GL { animation:glitch 11s ease-in-out infinite }
    .S  { opacity:0; animation:fadeIn .5s ease forwards 1.0s;
           font-family:"Courier New",Courier,monospace; font-size:9px;
           fill:#2e2e55; letter-spacing:7.5px }
    .D  { opacity:0; animation:fadeIn .45s ease forwards 1.4s }
    .ST { opacity:0; animation:fadeIn .45s ease forwards 1.85s }
    .BR { opacity:0; animation:fadeIn .35s ease forwards 2.1s }
    .BF { width:0; animation:bGrow 2.9s cubic-bezier(.38,0,.22,1) forwards 2.15s }
    .sl { font-family:"Courier New",Courier,monospace; font-size:9px; fill:#00e5ff; letter-spacing:2px }
    .sr { font-family:"Courier New",Courier,monospace; font-size:9px; fill:#ce93d8; letter-spacing:2px }
    .pc { font-family:"Courier New",Courier,monospace; font-size:9px; fill:#2e2e52 }
    .sw { animation:sweep 3.8s linear infinite; opacity:.028 }
  </style>
</defs>
