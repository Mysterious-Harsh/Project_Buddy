# =========================================
# BUDDY CONFIGURATION
# =========================================

[general]
name = "Buddy"
sleep_after_idle_sec = 5

# -----------------------------------------
# Bootstrap
# -----------------------------------------
[bootstrap]
show_boot_ui = true
download_models = true
force_model_reselect = false
force_vision_reselect = false

# -----------------------------------------
# LLM (llama.cpp — llama-server)
# model_gguf: fallback only — overridden by model selection on first boot
# -----------------------------------------
[llama]
base_url = "http://127.0.0.1:8080"
host = "127.0.0.1"
port = 8080
model_gguf = "Qwen3-14B-Q4_K_M.gguf"
model_name = "local-model"
ready_timeout_s = 180.0
scan_ports = [8080, 8081, 8082, 8088, 8888, 11434]
server_args = [
  "--ctx-size", "16384",
  "--threads", "8",
  "--threads-batch", "8",
  "--batch-size", "512",
  "--mmap",
  "--mlock",
  "--no-webui"
]

# -----------------------------------------
# Voice & Audio
# speech_trigger_mult: raise for noisy rooms, lower for quiet ones
# beam_size: 1 = fastest, 5 = more accurate
# -----------------------------------------
[voice]
enabled = true
microphone_index = 0
whisper_model_size = "small"
language = "en"
silence_timeout = 1.4
calibration_sec = 2.0
speech_trigger_mult = 3.0
whisper_vad_filter = true
use_silero_vad = true
enable_beep = true
beam_size = 5

# -----------------------------------------
# Memory
# -----------------------------------------
[memory]
flash_seconds = 60
short_term_hours = 6
long_term_enabled = true
embedding_model = "Qwen/Qwen3-Embedding-0.6B"

# -----------------------------------------
# Tools
# -----------------------------------------
[tools]
permissions_auto_approve = false

# -----------------------------------------
# Web Search
# engine: "searxng" | "duckduckgo"
# -----------------------------------------
[web_search]
engine = "duckduckgo"
searxng_url = "http://127.0.0.1:8888"
searxng_scan_ports = [8888, 8889, 8890, 4000, 5000]

# -----------------------------------------
# Features
# -----------------------------------------
[features]
enable_consolidation = true
enable_audio_stt = true
enable_audio_tts = true

# -----------------------------------------
# Brain
# -----------------------------------------
[brain]
min_context_score = 1.25
ambiguity_margin = 0.35
max_memories = 6

# -----------------------------------------
# Conversation
# -----------------------------------------
[context]
max_conversation_turn = 12

# -----------------------------------------
# Dynamic Context Budget
# Auto-computed from hardware. Set override = true to pin manual values.
# -----------------------------------------
[context_budget]
override = false
n_ctx = 16384
recent_turns = 14
top_k_memories = 10
pre_rerank_k = 20

# ============================================================
# Vector Store
# ============================================================
[vector_store]
backend = "local"

[vector_store.rerank]
enabled = true
method = "qwen3"
qwen_model = "Qwen/Qwen3-Reranker-0.6B"
dense_threshold = 0.24
rerank_threshold = 0.24
rerank_min_keep = 4

# -----------------------------------------
# User (set by first-boot wizard)
# -----------------------------------------
[user]
language = "en"
